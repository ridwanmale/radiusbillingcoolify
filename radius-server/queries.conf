# -*- text -*-
##
## queries.conf -- Custom MySQL Queries for FreeRADIUS
##
## FIX: Memastikan query Interim-Update meng-update kolom
##      acctinputoctets dan acctoutputoctets dengan benar
##      dari paket Accounting-Update MikroTik.
##

## =============================================================
## ACCOUNTING QUERIES
## =============================================================

#
# NOTE: Jika tidak ada record yang di-UPDATE oleh accounting_update_query
#       (misal: sesi belum pernah di-START), query berikutnya akan dijalankan.
#       Urutan: accounting_update_query -> accounting_update_query2
#

## ---- START sesi baru ----
accounting_start_query = "\
    INSERT INTO ${acct_table1} \
        (acctsessionid,     acctuniqueid,       username, \
         realm,             nasipaddress,       nasportid, \
         nasporttype,       acctstarttime,      acctupdatetime, \
         acctstoptime,      acctsessiontime,    acctauthentic, \
         connectinfo_start, acctinputoctets,    acctoutputoctets, \
         calledstationid,   callingstationid,   acctterminatecause, \
         servicetype,       framedprotocol,     framedipaddress) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
         '%{Realm}', '%{NAS-IP-Address}', '%{NAS-Port}', \
         '%{NAS-Port-Type}', NOW(), NOW(), \
         NULL, '0', '%{Acct-Authentic}', \
         '%{Connect-Info}', '0', '0', \
         '%{Called-Station-Id}', '%{Calling-Station-Id}', '', \
         '%{Service-Type}', '%{Framed-Protocol}', '%{Framed-IP-Address}')"

accounting_start_query_alt = "\
    UPDATE ${acct_table1} SET \
        acctstarttime   = NOW(), \
        acctupdatetime  = NOW(), \
        connectinfo_start = '%{Connect-Info}' \
    WHERE acctsessionid = '%{Acct-Session-Id}' \
    AND username        = '%{SQL-User-Name}' \
    AND nasipaddress    = '%{NAS-IP-Address}'"

## ---- INTERIM-UPDATE: Update traffic counters setiap 2 menit dari MikroTik ----
## FIX UTAMA: Pastikan acctinputoctets dan acctoutputoctets diupdate!
accounting_update_query = "\
    UPDATE ${acct_table1} \
    SET \
        framedipaddress     = '%{Framed-IP-Address}', \
        acctsessiontime     = '%{%{Acct-Session-Time}:-0}', \
        acctinputoctets     = '%{%{Acct-Input-Gigawords}:-0}' << 32 | '%{%{Acct-Input-Octets}:-0}', \
        acctoutputoctets    = '%{%{Acct-Output-Gigawords}:-0}' << 32 | '%{%{Acct-Output-Octets}:-0}', \
        acctupdatetime      = NOW() \
    WHERE acctsessionid     = '%{Acct-Session-Id}' \
    AND username            = '%{SQL-User-Name}' \
    AND nasipaddress        = '%{NAS-IP-Address}'"

## Jika sesi tidak ditemukan (misal: restart server), insert baru
accounting_update_query_alt = "\
    INSERT INTO ${acct_table1} \
        (acctsessionid,     acctuniqueid,       username, \
         realm,             nasipaddress,       nasportid, \
         nasporttype,       acctstarttime,      acctupdatetime, \
         acctstoptime,      acctsessiontime,    acctauthentic, \
         connectinfo_start, acctinputoctets,    acctoutputoctets, \
         calledstationid,   callingstationid,   acctterminatecause, \
         servicetype,       framedprotocol,     framedipaddress) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
         '%{Realm}', '%{NAS-IP-Address}', '%{NAS-Port}', \
         '%{NAS-Port-Type}', DATE_SUB(NOW(), INTERVAL '%{%{Acct-Session-Time}:-0}' SECOND), NOW(), \
         NULL, '%{%{Acct-Session-Time}:-0}', '%{Acct-Authentic}', \
         '%{Connect-Info}', \
         '%{%{Acct-Input-Gigawords}:-0}' << 32 | '%{%{Acct-Input-Octets}:-0}', \
         '%{%{Acct-Output-Gigawords}:-0}' << 32 | '%{%{Acct-Output-Octets}:-0}', \
         '%{Called-Station-Id}', '%{Calling-Station-Id}', '', \
         '%{Service-Type}', '%{Framed-Protocol}', '%{Framed-IP-Address}')"

## ---- STOP sesi ----
accounting_stop_query = "\
    UPDATE ${acct_table2} \
    SET \
        acctstoptime        = NOW(), \
        acctsessiontime     = '%{%{Acct-Session-Time}:-0}', \
        acctinputoctets     = '%{%{Acct-Input-Gigawords}:-0}' << 32 | '%{%{Acct-Input-Octets}:-0}', \
        acctoutputoctets    = '%{%{Acct-Output-Gigawords}:-0}' << 32 | '%{%{Acct-Output-Octets}:-0}', \
        acctterminatecause  = '%{Acct-Terminate-Cause}', \
        connectinfo_stop    = '%{Connect-Info}', \
        acctupdatetime      = NOW() \
    WHERE acctsessionid     = '%{Acct-Session-Id}' \
    AND username            = '%{SQL-User-Name}' \
    AND nasipaddress        = '%{NAS-IP-Address}'"

accounting_stop_query_alt = "\
    INSERT INTO ${acct_table2} \
        (acctsessionid,     acctuniqueid,       username, \
         realm,             nasipaddress,       nasportid, \
         nasporttype,       acctstarttime,      acctupdatetime, \
         acctstoptime,      acctsessiontime,    acctauthentic, \
         connectinfo_start, acctinputoctets,    acctoutputoctets, \
         calledstationid,   callingstationid,   acctterminatecause, \
         servicetype,       framedprotocol,     framedipaddress) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
         '%{Realm}', '%{NAS-IP-Address}', '%{NAS-Port}', \
         '%{NAS-Port-Type}', DATE_SUB(NOW(), INTERVAL '%{%{Acct-Session-Time}:-0}' SECOND), NOW(), \
         NOW(), '%{%{Acct-Session-Time}:-0}', '%{Acct-Authentic}', \
         '%{Connect-Info}', \
         '%{%{Acct-Input-Gigawords}:-0}' << 32 | '%{%{Acct-Input-Octets}:-0}', \
         '%{%{Acct-Output-Gigawords}:-0}' << 32 | '%{%{Acct-Output-Octets}:-0}', \
         '%{Called-Station-Id}', '%{Calling-Station-Id}', '%{Acct-Terminate-Cause}', \
         '%{Service-Type}', '%{Framed-Protocol}', '%{Framed-IP-Address}')"

## =============================================================
## AUTHORIZATION QUERIES
## =============================================================

authorize_check_query = "\
    SELECT id, username, attribute, value, op \
    FROM ${authcheck_table} \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id"

authorize_reply_query = "\
    SELECT id, username, attribute, value, op \
    FROM ${authreply_table} \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id"

authorize_group_check_query = "\
    SELECT ${groupcheck_table}.id, ${groupcheck_table}.groupname, ${groupcheck_table}.attribute, \
        ${groupcheck_table}.value, ${groupcheck_table}.op \
    FROM ${groupcheck_table}, ${usergroup_table} \
    WHERE ${usergroup_table}.username = '%{SQL-User-Name}' \
    AND ${usergroup_table}.groupname = ${groupcheck_table}.groupname \
    ORDER BY ${groupcheck_table}.id"

authorize_group_reply_query = "\
    SELECT ${groupreply_table}.id, ${groupreply_table}.groupname, ${groupreply_table}.attribute, \
        ${groupreply_table}.value, ${groupreply_table}.op \
    FROM ${groupreply_table}, ${usergroup_table} \
    WHERE ${usergroup_table}.username = '%{SQL-User-Name}' \
    AND ${usergroup_table}.groupname = ${groupreply_table}.groupname \
    ORDER BY ${groupreply_table}.id"

## =============================================================
## SIMULTANEOUS USE QUERIES
## =============================================================

simul_count_query = "\
    SELECT COUNT(*) \
    FROM ${acct_table1} \
    WHERE username = '%{SQL-User-Name}' \
    AND acctstoptime IS NULL"

simul_verify_query = "\
    SELECT radacctid, acctsessionid, username, nasipaddress, \
           nasportid, framedipaddress, callingstationid, framedprotocol \
    FROM ${acct_table1} \
    WHERE username = '%{SQL-User-Name}' \
    AND acctstoptime IS NULL"

## =============================================================
## POST-AUTH QUERIES
## =============================================================

post_auth_query = "\
    INSERT INTO ${postauth_table} \
        (username, pass, reply, authdate, class) \
    VALUES (\
        '%{SQL-User-Name}', \
        '%{%{User-Password}:-%{Chap-Password}}', \
        '%{reply:Packet-Type}', \
        NOW(), \
        '%{Class}')"

## =============================================================
## GROUP QUERIES
## =============================================================

group_membership_query = "\
    SELECT groupname \
    FROM ${usergroup_table} \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY priority"

## =============================================================
## CLIENT (NAS) QUERIES
## =============================================================

client_query = "\
    SELECT nasname, shortname, type, secret, server, community, description \
    FROM ${client_table}"
